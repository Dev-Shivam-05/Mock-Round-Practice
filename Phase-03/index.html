<!doctype html>
<html lang="en">

<head>
    <title>Guess Number Game</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <!-- Bootstrap CSS v5.2.1 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
</head>

<body class="bg-primary d-flex justify-content-center align-items-center">
    <section class="number-guessing mt-5 py-5 px-5 bg-white rounded-4" style="width: 500px;">
        <header>
            <div class="container d-flex flex-column justify-content-center align-items-center">
                <h1 class="text-secondary-emphasis fw-bold">Guess the Number</h1>
                <p class="text-secondary mb-0 fs-6">Pick a number between 1 and 100</p>
                <div class="best-score text-primary fw-semibold mb-3" id="bestScoreDisplay">Best Score: --</div>
            </div>
        </header>
        <main id="gameArea">
            <div class="container">
                <div class="input-group">
                    <input type="number" id="guessInput" class="form-control rounded-2 w-50" placeholder="Enter number..." min="1"
                        max="100">
                    <button id="submitBtn" class="btn btn-primary ms-3 rounded-2 px-3 py-2" type="button">Guess</button>
                </div>

                <div class="message-box my-4 text-center">
                    <p id="feedbackMessage" class="fs-5 fw-bold">Start guessing!</p>
                </div>

                <div class="stats bg-secondary-subtle p-3 rounded-3 text-start">
                    <p class="mb-0">Attempts: <span id="attemptCount" class="fw-bold text-primary">0</span></p>
                    <p class="mb-0">Previous Guesses: <span id="guessHistory" class="fw-bold text-primary">None</span></p>
                </div>
            </div>
        </main>

        <div id="restartArea" class="d-none">
            <div class="container">

                <h2 id="resultTitle">Game Over</h2>
                <button id="restartBtn" class="form-control btn btn-outline-secondary">Play Again</button>
            </div>
        </div>
    </section>
    <!-- Bootstrap JavaScript Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
        integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
        crossorigin="anonymous"></script>

    <script src="./js/script.js"></script>
</body>

</html>
